<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Gon's face outline -->
  <circle cx="50" cy="50" r="40" fill="#ffcc99" stroke="#000000" stroke-width="2" />
  
  <!-- Gon's spiky hair -->
  <path d="M30,30 L20,5 L35,20 L50,0 L65,20 L80,5 L70,30" fill="#006600" stroke="#000000" stroke-width="2" />
  
  <!-- Gon's eyes -->
  <circle cx="40" cy="45" r="5" fill="#ffffff" stroke="#000000" stroke-width="1" />
  <circle cx="60" cy="45" r="5" fill="#ffffff" stroke="#000000" stroke-width="1" />
  <circle cx="40" cy="45" r="2" fill="#000000" />
  <circle cx="60" cy="45" r="2" fill="#000000" />
  
  <!-- Gon's nose and mouth -->
  <circle cx="50" cy="55" r="2" fill="#000000" />
  <path d="M40,65 Q50,70 60,65" fill="none" stroke="#000000" stroke-width="1.5" />
</svg>
